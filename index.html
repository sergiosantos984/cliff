<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliff — Qualification Questionnaire Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --slate-blue: #334155;
            --warm-white: #FAFAF8;
            --light-taupe: #E7E2DA;
            --dusty-blue: #A7C0D9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--warm-white); color: var(--slate-blue); display: flex; justify-content: center; padding: 40px; }
        .app-container { background: white; width: 100%; max-width: 680px; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid var(--light-taupe); }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--slate-blue); margin-bottom: 5px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--slate-blue); }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--light-taupe); background-color: var(--warm-white); }
        
        .file-dropzone { border: 2px dashed var(--light-taupe); border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; color: var(--slate-blue); transition: 0.2s; }
        .file-dropzone:hover { border-color: var(--dusty-blue); }
        .file-input { display: none; }

        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background-color: var(--slate-blue); color: white; transition: 0.2s; }
        button:hover { background-color: #1e293b; }
        .btn-secondary { background-color: var(--dusty-blue); color: var(--slate-blue); margin-top: 10px; display: none; }
        
        #workspaceStack { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>Cliff</h1><p>Exact Style Template Engine</p></header>

    <div class="form-group">
        <label>Job Title / Header Context</label>
        <input type="text" id="jobTitle" value="DOT QUESTIONNAIRE Windows Server Lead - 910 - SAIJP00038947">
    </div>

    <div class="form-group">
        <label>Upload Job Description Document (.docx)</label>
        <div class="file-dropzone" onclick="document.getElementById('fileInput').click()">
            <p id="dropzoneText">➔ Click to upload template source (.docx)</p>
            <input type="file" id="fileInput" class="file-input" accept=".docx" onchange="handleFileSelect(event)">
        </div>
    </div>

    <div id="workspaceStack">
        <label>Extracted Original Elements</label>
        <textarea id="jobDescription" rows="6"></textarea>
    </div>

    <button id="generateBtn" onclick="processJobDescription()" style="margin-top:20px;">Parse & Map to Template Format</button>
    <button class="btn-secondary" id="downloadBtn" onclick="downloadWordFile()">Download Formatted Document (.doc)</button>
</div>

<script>
    let organizedSections = { topQuals: [], roleSpecs: [], prefSkills: [] };
    let citizenshipNote = "";

    async function extractDocxText(arrayBuffer) {
        const zip = await JSZip.loadAsync(arrayBuffer);
        const xmlText = await zip.file("word/document.xml").async("text");
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        return Array.from(xmlDoc.getElementsByTagName("w:t")).map(n => n.textContent).join("\n");
    }

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            document.getElementById('jobDescription').value = await extractDocxText(e.target.result);
            document.getElementById('workspaceStack').style.display = 'block';
            document.getElementById('dropzoneText').innerText = `✓ Loaded: ${file.name}`;
        };
        reader.readAsArrayBuffer(file);
    }

    function processJobDescription() {
        const rawText = document.getElementById('jobDescription').value;
        if (!rawText.trim()) { alert("Please supply content arrays first."); return; }

        organizedSections = { topQuals: [], roleSpecs: [], prefSkills: [] };
        citizenshipNote = "";

        const uniqueLines = new Set();

        const lines = rawText.split('\n')
            .map(l => l.trim())
            .filter(l => {
                if (l.length < 10) return false;
                const low = l.toLowerCase();
                
                if (low.includes("checklist") || 
                    low.includes("explain how the candidate") || 
                    low.includes("under each bullet") || 
                    low.includes("not met, simply write") || 
                    low.includes("avoid restating") || 
                    low.includes("instead, reference") || 
                    low.includes("aim for 2 to 3") ||
                    low.includes("submission") ||
                    low.includes("company") ||
                    low.includes("candidate name") ||
                    low.includes("meet the lcat")) {
                    return false;
                }
                return true;
            });

        lines.forEach(line => {
            if (uniqueLines.has(line)) return;
            uniqueLines.add(line);

            const lower = line.toLowerCase();
            
            if (lower.includes("candidate must be a u.s. citizen") || lower.includes("public trust")) {
                citizenshipNote = line;
            } else if (lower.includes("cert") || lower.includes("preferred") || lower.includes("scrum") || lower.includes("pmp") || lower.includes("itil") || lower.includes("architect") || lower.includes("cloud") || lower.includes("migrations")) {
                organizedSections.prefSkills.push(line);
            } else if (lower.includes("managing") || lower.includes("teams of") || lower.includes("personnel") || lower.includes("manager") || lower.includes("multi-discipline") || lower.includes("itsm") || lower.includes("operating systems") || lower.includes("interpersonal")) {
                organizedSections.roleSpecs.push(line);
            } else {
                organizedSections.topQuals.push(line);
            }
        });

        document.getElementById('downloadBtn').style.display = 'block';
        alert("Categorization complete! Submissions styles mapped.");
    }

    function buildTemplateHeaderBlock(headerTitle) {
        return `
            <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#000000; font-weight:bold; margin-top:14pt; margin-bottom:4pt;">Explain how the candidate meets the ${headerTitle}:</p>
            <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#595959; margin-bottom:3pt; margin-left:15pt;">• Under each bullet point, briefly explain how the candidate meets the requirement.</p>
            <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#595959; margin-bottom:3pt; margin-left:15pt;">• If the requirement is not met, simply write “N/A.”</p>
            <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#595959; margin-bottom:3pt; margin-left:15pt;">• Avoid restating the requirement or answering with a simple “yes.”</p>
            <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#595959; margin-bottom:3pt; margin-left:15pt;">• Instead, reference where the experience appears on the candidate’s resume and provide a concise explanation of what that experience entails.</p>
            <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#595959; margin-bottom:12pt; margin-left:15pt;">• Aim for 2 to 3 sentences—no full paragraphs are necessary.</p>
        `;
    }

    function buildTemplateItems(items) {
        if(items.length === 0) return `<p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#000000; margin-left:15pt; margin-bottom:12pt;">[N/A]</p>`;
        return items.map(item => `
            <div style="margin-bottom:12pt; page-break-inside: avoid;">
                <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#000000; margin-left:15pt; margin-bottom:4pt;">• ${item}</p>
                <p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#000000; margin-left:30pt; margin-top:2pt; margin-bottom:8pt;">[Type response details matching candidate resume path validation points here]</p>
            </div>
        `).join('');
    }

    function downloadWordFile() {
        const title = document.getElementById('jobTitle').value || "DOT QUESTIONNAIRE Windows Server Lead - 910 - SAIJP00038947";
        
        let html = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
            <style>
                body { font-family: 'Calibri', sans-serif; font-size: 11pt; color: #000000; line-height: 1.4; }
                p { font-family: 'Calibri', sans-serif; font-size: 11pt; margin: 0; padding: 0; color: #000000; }
            </style>
        </head>
        <body>
            <p style="font-family:'Calibri',sans-serif; font-size:14pt; font-weight:bold; color:#000000; margin-bottom:2pt;">RESUME REVIEW AND SUBMISSION</p>
            <p style="font-family:'Calibri',sans-serif; font-size:12pt; font-weight:bold; color:#000000; margin-bottom:12pt;">Resume Submission Checklist</p>
            
            <p style="font-family:'Arial',sans-serif; font-size:11pt; color:#FF0000; margin-bottom:14pt;">Complete this checklist to facilitate resume review and submission.</p>
            <p style="font-family:'Arial',sans-serif; font-size:11pt; font-weight:bold; color:#FF0000; margin-bottom:4pt;">Company  :  Leidos</p>
            <p style="font-family:'Arial',sans-serif; font-size:11pt; font-weight:bold; color:#FF0000; margin-bottom:4pt;">Candidate Name  :  [Candidate Name]</p>
            <p style="font-family:'Arial',sans-serif; font-size:11pt; font-weight:bold; color:#FF0000; margin-bottom:4pt;">Meet the LCAT education requirement?  :</p>
            <p style="font-family:'Arial',sans-serif; font-size:11pt; font-weight:bold; color:#FF0000; margin-bottom:18pt;">Meet the LCAT experience requirement?  :</p>
            
            ${buildTemplateHeaderBlock("Top Qualifications, Skills, Experience or Certifications")}
            ${buildTemplateItems(organizedSections.topQuals)}
            
            ${buildTemplateHeaderBlock("Job Role Specific Requirements")}
            ${buildTemplateItems(organizedSections.roleSpecs)}
            
            ${buildTemplateHeaderBlock("Preferred Skills and Qualifications")}
            ${buildTemplateItems(organizedSections.prefSkills)}

            ${citizenshipNote ? `<p style="font-family:'Calibri',sans-serif; font-size:11pt; color:#000000; margin-top:20pt; font-weight:bold;">Note: ${citizenshipNote.replace(/Note:\s*/i, "")}</p>` : ""}
        </body>
        </html>`;
        
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${title.replace(/[^a-zA-Z0-9\s-]/g, "")}.doc`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    }
</script>
</body>
</html>
